<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedControl — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #0f766e;
      --primary-light: #14b8a6;
      --accent: #f59e0b;
      --dark: #0f172a;
      --surface: #1e293b;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(15,118,110,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(245,158,11,0.1) 0%, transparent 55%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0f172a 0%, #020617 100%);
    }
    .grid-lines {
      position: fixed; inset: 0; z-index: 0; opacity: 0.04;
      background-image:
        linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .login-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px; padding: 1rem;
    }
    .login-card {
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 2.5rem 2.5rem 2rem;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    }
    .logo-mark {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin-bottom: 1.2rem;
      box-shadow: 0 8px 24px rgba(20,184,166,0.35);
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.8rem;
      color: #f8fafc; margin-bottom: 0.2rem;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    label { color: var(--muted); font-size: 0.82rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
    .form-control {
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(255,255,255,0.12);
      color: #f1f5f9; border-radius: 12px;
      padding: .7rem 1rem; font-family: 'DM Sans', sans-serif;
      transition: all .2s;
    }
    .form-control:focus {
      background: rgba(15,23,42,0.9);
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(20,184,166,0.15);
      color: #f1f5f9;
    }
    .form-control::placeholder { color: #64748b; }
    .input-group-text {
      background: rgba(15,23,42,0.7);
      border: 1px solid rgba(255,255,255,0.12);
      border-right: none; color: #64748b;
      border-radius: 12px 0 0 12px;
    }
    .input-group .form-control { border-left: none; border-radius: 0 12px 12px 0; }
    .btn-login {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border: none; border-radius: 12px;
      color: white; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 0.95rem;
      padding: .8rem; width: 100%;
      letter-spacing: .03em;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(20,184,166,0.3);
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(20,184,166,0.45);
      color: white;
    }
    .alert-danger {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5; border-radius: 12px; font-size: 0.88rem;
    }
    .hint { color: #475569; font-size: 0.8rem; text-align: center; margin-top: 1.2rem; }
    .hint code { background: var(--surface2); padding: 2px 6px; border-radius: 6px; color: var(--muted); }
    .version-badge {
      position: fixed; bottom: 1rem; right: 1rem;
      background: rgba(30,41,59,0.8); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.06);
      color: #475569; font-size: 0.75rem;
      padding: .3rem .7rem; border-radius: 20px; z-index: 10;
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="grid-lines"></div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="logo-mark">💊</div>
      <h1>MedControl</h1>
      <p class="subtitle">Sistema de Controle de Validade de Medicamentos</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} mb-3">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Usuário</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Senha</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar no Sistema
        </button>
      </form>

      
    </div>
  </div>

  <div class="version-badge">v1.0 • MedControl</div>

  <script>
    (function() {
      const saved = localStorage.getItem('mc-theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
</body>
</html>
