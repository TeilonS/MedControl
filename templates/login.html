<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedControl — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, var(--primary-bg) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(245,158,11,0.1) 0%, transparent 55%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #0f172a 0%, #020617 100%);
    }
    [data-theme="light"] .bg-mesh {
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, var(--primary-bg) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(245,158,11,0.05) 0%, transparent 55%),
        radial-gradient(ellipse 100% 100% at 50% 50%, #f8fafc 0%, #f1f5f9 100%);
    }
    .grid-lines {
      position: fixed; inset: 0; z-index: 0; opacity: 0.04;
      background-image:
        linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    [data-theme="light"] .grid-lines { opacity: 0.1; background-image: linear-gradient(#0f172a 1px, transparent 1px), linear-gradient(90deg, #0f172a 1px, transparent 1px); }
    .login-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 420px; padding: 1rem;
    }
    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 2.5rem 2.5rem 2rem;
      box-shadow: var(--card-shadow);
    }
    .logo-mark {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--primary-l));
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; margin-bottom: 1.2rem;
      box-shadow: 0 8px 24px rgba(20,184,166,0.25);
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.8rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-l));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.2rem;
    }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    label { color: var(--muted); font-size: 0.82rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase; }
    .form-control {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--input-text); border-radius: 12px;
      padding: .7rem 1rem; font-family: 'DM Sans', sans-serif;
      transition: all .2s;
    }
    .form-control:focus {
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px rgba(13,148,136,0.15);
      color: var(--input-text);
    }
    .input-group-text {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-right: none; color: var(--muted);
      border-radius: 12px 0 0 12px;
    }
    .input-group .form-control { border-left: none; border-radius: 0 12px 12px 0; }
    .btn-login {
      background: linear-gradient(135deg, var(--primary), var(--primary-l));
      border: none; border-radius: 12px;
      color: white; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 0.95rem;
      padding: .8rem; width: 100%;
      letter-spacing: .03em;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(20,184,166,0.3);
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(20,184,166,0.45);
      color: white;
    }
    .alert-danger {
      background: var(--red-bg, rgba(239,68,68,0.15)); border: 1px solid var(--border);
      color: var(--red, #ef4444); border-radius: 12px; font-size: 0.88rem;
    }
    .hint { color: var(--muted); font-size: 0.8rem; text-align: center; margin-top: 1.2rem; }
    .hint code { background: var(--surface2); padding: 2px 6px; border-radius: 6px; color: var(--muted); }
    .version-badge {
      position: fixed; bottom: 1rem; right: 1rem;
      background: var(--card-bg); backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      color: var(--muted); font-size: 0.75rem;
      padding: .3rem .7rem; border-radius: 20px; z-index: 10;
    }
  </style>
</head>
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="grid-lines"></div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="logo-mark">💊</div>
      <h1>MedControl</h1>
      <p class="subtitle">Sistema de Controle de Validade de Medicamentos</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} mb-3">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ message }}
          </div>
        {% endfor %}
      {% endwith %}

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Usuário</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" name="username" class="form-control" placeholder="seu_usuario" required autofocus autocomplete="username" style="text-overflow:ellipsis;" autocapitalize="none" spellcheck="false">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label">Senha</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-login">
          <i class="bi bi-box-arrow-in-right me-2"></i>Entrar no Sistema
        </button>
      </form>

      <div style="text-align:center;margin-top:1.4rem;border-top:1px solid rgba(255,255,255,0.07);padding-top:1.2rem;">
        <span style="color:#475569;font-size:.85rem;">Ainda não tem conta?</span>
        <a href="{{ url_for('registrar') }}" style="color:var(--primary-light);font-weight:600;text-decoration:none;font-size:.85rem;margin-left:.4rem;">Criar conta grátis →</a>
      </div>

      
    </div>
  </div>

  <div class="version-badge">v1.0 • MedControl</div>

  <script>
    (function() {
      const saved = localStorage.getItem('mc-theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
</body>
</html>
