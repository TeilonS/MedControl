<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedControl — Assinatura Expirada</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: var(--bg);
      font-family: 'DM Sans', sans-serif; color: var(--text);
      display: flex; align-items: center; justify-content: center;
    }
    .bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(239,68,68,0.12) 0%, transparent 70%),
                  radial-gradient(ellipse 100% 100% at 50% 100%, #020617 0%, #0f172a 100%);
    }
    .card {
      position: relative; z-index: 10;
      background: rgba(30,41,59,0.9); backdrop-filter: blur(20px);
      border: 1px solid rgba(239,68,68,0.2); border-radius: 24px;
      padding: 3rem 2.5rem; max-width: 480px; width: 90%; text-align: center;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    }
    .icon {
      font-size: 3.5rem; margin-bottom: 1.2rem;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    h1 {
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1.8rem; color: #f87171; margin-bottom: .6rem;
    }
    p { color: var(--muted); line-height: 1.7; margin-bottom: 1.5rem; }
    .highlight {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 1.8rem;
      color: #fca5a5; font-size: .9rem;
    }
    .btn-contact {
      display: inline-block; background: linear-gradient(135deg, #0f766e, #14b8a6);
      color: white; text-decoration: none; border-radius: 12px;
      padding: .8rem 2rem; font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: .95rem; margin-bottom: .8rem;
      transition: all .2s; box-shadow: 0 4px 20px rgba(20,184,166,0.3);
    }
    .btn-contact:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(20,184,166,0.45); color: white; }
    .btn-logout {
      display: block; color: var(--sb-text); text-decoration: none;
      font-size: .85rem; margin-top: .5rem; transition: color .2s;
    }
    .btn-logout:hover { color: var(--muted); }
  </style>
</head>

    <a href="{{ url_for('logout') }}" class="btn-logout">Sair da conta</a>
